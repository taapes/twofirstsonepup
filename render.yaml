services:
  - type: web
    name: twofirstsonepup
    runtime: python
    plan: free
    autoDeploy: true
    region: oregon            # or "frankfurt" etc.; optional
    healthCheckPath: /health  # FastAPI health endpoint

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      # Apply DB migrations once per deploy (DATABASE_URL is available at build
      # time). Kept out of startCommand so free-tier cold starts aren't slowed.
      alembic upgrade head

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port 10000

    envVars:
      # Set these in the Render dashboard after the service is created
      - key: DATABASE_URL
        sync: false
      - key: SYNC_AUTH_TOKEN
        sync: false
      # FPL Draft league id — needed by sync.py; not secret, but set in
      # dashboard alongside the others for one place to manage env.
      - key: FPL_DRAFT_LEAGUE_ID
        sync: false
      # Signs the commissioner UI session cookie. Generate a random value.
      - key: SECRET_KEY
        generateValue: true
      # Commissioner UI login password (temporary, until proper auth).
      - key: ADMIN_PASSWORD
        value: sports
      # Environment label; a non-"prod" value shows a TEST banner site-wide.
      - key: APP_ENV
        value: prod

  # --- Demo sandbox: same code, separate Neon branch DB, passwordless login. ---
  # Point DATABASE_URL at a Neon BRANCH of prod (instant copy); prod is untouched.
  - type: web
    name: twofirstsonepup-demo
    runtime: python
    plan: free
    autoDeploy: true
    region: oregon
    healthCheckPath: /health

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      alembic upgrade head

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port 10000

    envVars:
      # Neon DEMO BRANCH connection string (NOT prod). Set in the dashboard.
      - key: DATABASE_URL
        sync: false
      # demo mode: enables passwordless "pick any manager" login + DEMO banner
      - key: APP_ENV
        value: demo
      - key: SESSION_HTTPS_ONLY
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: SYNC_AUTH_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        value: demo
      - key: FPL_DRAFT_LEAGUE_ID
        sync: false
