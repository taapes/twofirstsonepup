<div id="discovery-results">
  {% if results %}
  <table>
    <thead><tr><th>Player</th><th></th><th class="num">Pts</th><th></th></tr></thead>
    <tbody>
      {% for r in results %}
      <tr {% if r.taken %}class="taken-row"{% endif %}>
        <td>{{ r.name }}</td>
        <td class="sub">{{ r.position }} · {{ r.team }}</td>
        <td class="num">{{ r.points if r.points is not none else "—" }}</td>
        <td class="num">
          {% if r.taken %}<span class="pill warn" title="{{ r.taken_by }}">{{ r.taken_by }}</span>
          {% elif can_pick %}
          <button hx-post="/discovery/{{ year }}/pick" hx-vals='{"player_fpl_id": {{ r.fpl_id }}}'
                  hx-target="#discovery-board" hx-swap="outerHTML">Pick</button>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}<p class="empty">Search for a player to discovery-draft.</p>{% endif %}
</div>
