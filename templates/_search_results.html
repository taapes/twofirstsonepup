<div id="search-results">
  {% if results %}
  <table>
    <thead><tr><th>Player</th><th></th><th class="num">£m</th><th class="num">Pts</th><th></th></tr></thead>
    <tbody>
      {% for r in results %}
      <tr>
        <td>{{ r.name }}</td>
        <td class="sub">{{ r.position }} · {{ r.team }}</td>
        <td class="num">{{ "%.1f"|format(r.price) if r.price is not none else "—" }}</td>
        <td class="num">{{ r.points if r.points is not none else "—" }}</td>
        <td class="num">
          <button hx-post="/draft/{{ year }}/pick" hx-vals='{"player_fpl_id": {{ r.fpl_id }}}'
                  hx-target="#board" hx-swap="outerHTML">Draft</button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p class="empty">No players match.</p>
  {% endif %}
</div>
