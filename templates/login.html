{% extends "base.html" %}
{% block title %}Commissioner login{% endblock %}
{% block content %}
<h1>Commissioner login</h1>
{% if error %}<p class="sub" style="color:var(--warn)">{{ error }}</p>{% endif %}
<form method="post" action="/admin/login" class="card" style="padding:16px;max-width:360px">
  <input type="hidden" name="next" value="{{ next }}">
  <input type="password" name="password" placeholder="Password" autofocus style="width:100%;margin-bottom:10px">
  <button type="submit">Log in</button>
</form>
{% endblock %}
