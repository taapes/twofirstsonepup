<div class="card">
  <table>
    <thead><tr><th colspan="3"><a href="/team/{{ t.manager_fpl }}">{{ t.manager }}</a></th></tr></thead>
    <tbody>
      {% for p in t.players %}
      <tr>
        <td>{{ p.player }}</td>
        <td class="tag">{{ p.position }} · {{ p.acquisition }}</td>
        <td class="num">
          {% if p.years_remaining > 0 %}{{ p.years_remaining }} left{% else %}<span class="pill warn">max</span>{% endif %}
        </td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="sub">No roster data.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
